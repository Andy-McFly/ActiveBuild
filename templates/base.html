<!doctype html>
<html lang="es" data-theme="standard">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ActiveBuild</title>
    <script>
      (function () {
        document.documentElement.setAttribute(
          "data-theme",
          localStorage.getItem("ab_theme") || "standard",
        );
      })();
    </script>
    <script src="/static/js/i18n.js"></script>
    <link rel="stylesheet" href="/static/css/main.css" />
  </head>
  <body>
    <div class="app-shell">
      <nav class="sidebar">
        <div class="sidebar-logo">
          <img
            src="/static/img/logo.png"
            style="width: 22px; height: 22px; object-fit: contain"
          />
          <span>ActiveBuild</span>
        </div>

        <a href="/" class="nav-item {% if active == 'home' %}active{% endif %}">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          <span data-i18n="nav_home">Inicio</span>
        </a>

        <a
          href="/games"
          class="nav-item {% if active == 'games' %}active{% endif %}"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
            />
          </svg>
          <span data-i18n="nav_games">Mis juegos</span>
        </a>

        <a
          href="/stats"
          class="nav-item {% if active == 'stats' %}active{% endif %}"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="18" y1="20" x2="18" y2="10" />
            <line x1="12" y1="20" x2="12" y2="4" />
            <line x1="6" y1="20" x2="6" y2="14" />
          </svg>
          <span data-i18n="nav_stats">Estadísticas</span>
        </a>

        <a
          href="/settings"
          class="nav-item {% if active == 'settings' %}active{% endif %}"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
            />
          </svg>
          <span data-i18n="nav_settings">Ajustes</span>
        </a>
      </nav>

      <main class="main-content">{% block content %}{% endblock %}</main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      // Cargar tema guardado
      fetch("/api/settings")
        .then((r) => r.json())
        .then((s) => {
          localStorage.setItem("ab_theme", s.theme);
          document.documentElement.setAttribute("data-theme", s.theme);
          if (typeof setLanguage === "function") setLanguage(s.language);
        });

      // Toast helper
      function showToast(msg, type = "success") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = "toast " + type + " show";
        setTimeout(() => (t.className = "toast"), 2800);
      }
    </script>

    {% block scripts %}{% endblock %}
  </body>
</html>
